from flask import Flask, render_template, request, redirect, session, flash, jsonify
from datetime import datetime
from urllib.parse import urlparse, unquote
import os, secrets, pg8000

app = Flask(__name__)
app.secret_key = os.environ.get("SECRET_KEY", "boztek-secret")
DATABASE_URL = os.environ.get("DATABASE_URL")
ADMIN_USERNAME = os.environ.get("ADMIN_USERNAME", "saban")
ADMIN_PASSWORD = os.environ.get("ADMIN_PASSWORD", "5109")
READY = False
LAST_ERROR = ""

def parse_db_url():
    if not DATABASE_URL:
        raise RuntimeError("DATABASE_URL yok. Render Environment içine Neon linkini ekle.")
    u = urlparse(DATABASE_URL)
    return dict(user=unquote(u.username or ""), password=unquote(u.password or ""), host=u.hostname, port=u.port or 5432, database=(u.path or "/neondb").lstrip("/"))

def db():
    c = parse_db_url()
    return pg8000.connect(user=c["user"], password=c["password"], host=c["host"], port=c["port"], database=c["database"], ssl_context=True, timeout=15)

def rows_to_dicts(cur, rows):
    if not rows:
        return []
    cols = [c["name"] if isinstance(c, dict) else c[0] for c in cur.description]
    return [dict(zip(cols, r)) for r in rows]

def q(sql, params=None, fetch=False, one=False):
    conn = db()
    try:
        cur = conn.cursor()
        cur.execute(sql, params or ())
        data = None
        if fetch:
            data = rows_to_dicts(cur, cur.fetchall())
            if one:
                data = data[0] if data else None
        conn.commit()
        cur.close()
        return data
    finally:
        conn.close()

def try_init():
    global READY, LAST_ERROR
    if READY:
        return True
    try:
        q("create table if not exists personnel(id serial primary key,full_name text not null,department text not null,annual_leave_total integer default 14,annual_leave_used integer default 0,annual_leave_remaining integer default 14,salary numeric default 0,active integer default 1,username text unique,password text,token text unique)")
        q("create table if not exists advances(id serial primary key,person_id integer references personnel(id) on delete cascade,amount numeric not null,note text,status text default 'Beklemede')")
        q("create table if not exists leaves(id serial primary key,person_id integer references personnel(id) on delete cascade,start_date text not null,end_date text not null,days_count integer default 0,status text default 'İzinli')")
        q("create table if not exists attendance_logs(id serial primary key,person_id integer references personnel(id) on delete cascade,event_type text not null,event_time text not null)")
        READY = True
        LAST_ERROR = ""
        return True
    except Exception as e:
        LAST_ERROR = str(e)
        return False

def admin():
    return session.get("admin_ok") is True

def val(n, d=None):
    return request.form.get(n) or request.args.get(n) or d

def days_between(a, b):
    s = datetime.strptime(a, "%Y-%m-%d").date()
    e = datetime.strptime(b, "%Y-%m-%d").date()
    return max((e - s).days + 1, 1)

@app.route("/")
def home():
    return redirect("/admin/dashboard") if admin() else redirect("/admin/login")

@app.route("/admin/login", methods=["GET","POST"])
def login():
    if request.method == "POST":
        if request.form.get("username") == ADMIN_USERNAME and request.form.get("password") == ADMIN_PASSWORD:
            session["admin_ok"] = True
            return redirect("/admin/dashboard")
        flash("Hatalı giriş")
    return render_template("login.html")

@app.route("/admin/logout")
def logout():
    session.clear()
    return redirect("/admin/login")

@app.route("/admin")
@app.route("/admin/dashboard")
def dash():
    if not admin():
        return redirect("/admin/login")
    ok = try_init()
    stats = {"personel":0, "avans":0, "izin":0}
    err = ""
    if ok:
        try:
            stats = q("select (select count(*) from personnel) personel,(select count(*) from advances) avans,(select count(*) from leaves) izin", fetch=True, one=True)
        except Exception as e:
            err = str(e)
    else:
        err = LAST_ERROR
    return render_template("dashboard.html", title="Dashboard", stats=stats, db_status=("Database bağlı" if ok else "Database bağlantı hatası"), error=err)

@app.route("/admin/personnel", methods=["GET","POST"])
def personnel():
    if not admin():
        return redirect("/admin/login")
    ok = try_init()
    if not ok:
        return render_template("personnel.html", title="Personel", rows=[], error=LAST_ERROR)
    if request.method == "POST":
        total = int(request.form.get("annual_leave_total",14))
        salary = float(request.form.get("salary",0))
        try:
            q("insert into personnel(full_name,department,annual_leave_total,annual_leave_used,annual_leave_remaining,salary,active,username,password,token) values(%s,%s,%s,0,%s,%s,1,%s,%s,%s)", (request.form["full_name"], request.form["department"], total, total, salary, request.form.get("username") or None, request.form.get("password") or None, secrets.token_hex(24)))
            flash("Personel eklendi.")
        except Exception as e:
            flash("Eklenemedi: " + str(e))
    rows = q("select * from personnel order by id desc", fetch=True)
    return render_template("personnel.html", title="Personel", rows=rows, error="")

@app.route("/admin/personnel/<int:pid>/delete", methods=["POST"])
def delete_person(pid):
    if not admin():
        return redirect("/admin/login")
    if try_init():
        q("delete from personnel where id=%s", (pid,))
    return redirect("/admin/personnel")

@app.route("/admin/advances", methods=["GET","POST"])
def advances():
    if not admin():
        return redirect("/admin/login")
    if not try_init():
        return render_template("table.html", title="Avanslar", subtitle="", body="", error=LAST_ERROR)
    if request.method == "POST":
        q("insert into advances(person_id,amount,note,status) values(%s,%s,'','Beklemede')", (request.form["person_id"], request.form["amount"]))
        flash("Avans kaydedildi.")
    people = q("select * from personnel order by full_name", fetch=True)
    rows = q("select a.*,p.full_name from advances a join personnel p on p.id=a.person_id order by a.id desc limit 200", fetch=True)
    opts = "".join([f"<option value='{p['id']}'>{p['full_name']}</option>" for p in people])
    trs = "".join([f"<tr><td>{r['full_name']}</td><td>{float(r['amount']):.2f} ₺</td><td>{r['status']}</td></tr>" for r in rows])
    body = f"<div class='card'><form method='post' class='form-grid'><div class='field'><label>Personel</label><select name='person_id'>{opts}</select></div><div class='field'><label>Tutar</label><input name='amount' type='number' step='0.01' required></div><button class='btn'>Avans Ekle</button></form></div><div class='card'><table class='table'><tr><th>Personel</th><th>Tutar</th><th>Durum</th></tr>{trs}</table></div>"
    return render_template("table.html", title="Avanslar", subtitle="Avans girildiğinde maaştan düşer.", body=body, error="")

@app.route("/admin/leaves", methods=["GET","POST"])
def leaves():
    if not admin():
        return redirect("/admin/login")
    if not try_init():
        return render_template("table.html", title="İzinler", subtitle="", body="", error=LAST_ERROR)
    if request.method == "POST":
        pid = request.form["person_id"]
        start = request.form["start_date"]
        end = request.form["end_date"]
        count = days_between(start,end)
        p = q("select * from personnel where id=%s", (pid,), fetch=True, one=True)
        if p and p["annual_leave_remaining"] >= count:
            q("insert into leaves(person_id,start_date,end_date,days_count,status) values(%s,%s,%s,%s,'İzinli')", (pid,start,end,count))
            q("update personnel set annual_leave_used=annual_leave_used+%s,annual_leave_remaining=annual_leave_remaining-%s where id=%s", (count,count,pid))
            flash("İzin kaydedildi.")
    people = q("select * from personnel order by full_name", fetch=True)
    rows = q("select l.*,p.full_name from leaves l join personnel p on p.id=l.person_id order by l.id desc limit 200", fetch=True)
    opts = "".join([f"<option value='{p['id']}'>{p['full_name']} - Kalan {p['annual_leave_remaining']}</option>" for p in people])
    trs = "".join([f"<tr><td>{r['full_name']}</td><td>{r['start_date']} - {r['end_date']}</td><td>{r['days_count']}</td><td>{r['status']}</td></tr>" for r in rows])
    body = f"<div class='card'><form method='post' class='form-grid'><div class='field'><label>Personel</label><select name='person_id'>{opts}</select></div><div class='field'><label>Başlangıç</label><input name='start_date' type='date' required></div><div class='field'><label>Bitiş</label><input name='end_date' type='date' required></div><button class='btn'>İzin Ekle</button></form></div><div class='card'><table class='table'><tr><th>Personel</th><th>Tarih</th><th>Gün</th><th>Durum</th></tr>{trs}</table></div>"
    return render_template("table.html", title="İzinler", subtitle="İzin girildiğinde yıllık izin düşer.", body=body, error="")

@app.route("/admin/salary")
def salary_page():
    if not admin():
        return redirect("/admin/login")
    if not try_init():
        return render_template("table.html", title="Maaşlar", subtitle="", body="", error=LAST_ERROR)
    rows = q("select p.*,coalesce(sum(a.amount),0) total_advance from personnel p left join advances a on a.person_id=p.id group by p.id order by full_name", fetch=True)
    trs = ""
    for r in rows:
        s = float(r["salary"] or 0); a = float(r["total_advance"] or 0)
        trs += f"<tr><td>{r['full_name']}</td><td>{r['department']}</td><td>{s:.2f} ₺</td><td>{a:.2f} ₺</td><td><b>{s-a:.2f} ₺</b></td></tr>"
    return render_template("table.html", title="Maaşlar", subtitle="Avans maaştan düşer.", body=f"<div class='card'><table class='table'><tr><th>Personel</th><th>Bölüm</th><th>Maaş</th><th>Avans</th><th>Kalan</th></tr>{trs}</table></div>", error="")

