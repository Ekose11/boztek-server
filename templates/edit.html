{% extends "base.html" %}
{% block content %}
<h1>Personel Düzenle</h1>
<form method="post" style="background:white;padding:15px;border-radius:14px">
<input name="full_name" value="{{ p.full_name }}" required>
<input name="department" value="{{ p.department }}" required>
<input name="username" value="{{ p.username or '' }}" placeholder="Kullanıcı adı">
<input name="password" value="{{ p.password or '' }}" placeholder="Şifre">
<input name="annual_leave_total" type="number" value="{{ p.annual_leave_total }}">
<input name="annual_leave_used" type="number" value="{{ p.annual_leave_used }}">
<input name="salary" type="number" step="0.01" value="{{ p.salary }}">
<select name="active">
<option value="1" {% if p.active %}selected{% endif %}>Aktif</option>
<option value="0" {% if not p.active %}selected{% endif %}>Pasif</option>
</select>
<button>Kaydet</button>
</form>
{% endblock %}
