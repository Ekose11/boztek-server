<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">B</div>
      <div>
        <div class="logo-title">Boztek</div>
        <div class="logo-sub">Servis & Personel Yönetimi</div>
      </div>
    </div>
    <nav class="nav">
      <a href="/admin/dashboard">📊 Dashboard</a>
      <a href="/admin/personnel">👥 Personel Yönetimi</a>
      <a href="/admin/attendance">🟢 Giriş / Çıkış</a>
      <a href="/admin/leaves">📅 İzinler</a>
      <a href="/admin/annual-leave">🏖️ Yıllık İzin</a>
      <a href="/admin/advances">💸 Avanslar</a>
      <a href="/admin/salary">💰 Maaşlar</a>
      <a href="/admin/reports">📄 Aylık Rapor</a>
      <a href="/admin/logout">🚪 Çıkış</a>
    </nav>
  </aside>
  <main class="main">
    {% with messages=get_flashed_messages() %}
      {% for m in messages %}<div class="flash">{{m}}</div>{% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
